name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cinnetemple
          POSTGRES_PASSWORD: cinnetemple
          POSTGRES_DB: cinnetemple_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://cinnetemple:cinnetemple@localhost:5432/cinnetemple_test?schema=public
          REDIS_URL: redis://localhost:6379
      - run: pnpm build

  ios:
    name: iOS Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build CinneTemple iOS
        run: |
          xcodebuild -project apps/ios/CinneTemple.xcodeproj \
            -scheme CinneTemple \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            build CODE_SIGNING_ALLOWED=NO | xcpretty || true
