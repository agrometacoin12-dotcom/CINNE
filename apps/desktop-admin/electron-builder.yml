appId: com.cinnetemple.studio
productName: CinneTemple Studio
npmRebuild: false
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: CinneTemple-Studio-Setup-${version}.${ext}
portable:
  artifactName: CinneTemple-Studio-${version}-portable.${ext}
