# AWS Amplify Hosting build settings (monorepo root).
# Builds the Next.js web app from apps/web inside the pnpm workspace.
version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20 || nvm install 20
            - corepack enable
            - corepack prepare pnpm@9 --activate
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter @cinnetemple/web build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
