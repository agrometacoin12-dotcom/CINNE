# Local development infrastructure for CinneTemple.
# Brings up Postgres + Redis so the backend can run end-to-end offline.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinnetemple
      POSTGRES_PASSWORD: cinnetemple
      POSTGRES_DB: cinnetemple
    ports:
      - '5433:5432'
    volumes:
      - cinnetemple_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cinnetemple']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cinnetemple_pg:
